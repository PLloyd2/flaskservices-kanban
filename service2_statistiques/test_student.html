<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test /stats/test_student</title>
</head>
<body>
  <h2>Test unitaire — POST /stats/test_student</h2>
  <!-- Bouton qui déclenche le test au clic -->
  <button onclick="runTest()">Lancer le test</button>
  <!-- Zone d'affichage du résultat JSON -->
  <pre id="result"></pre>
  <script>
    async function runTest() {
      // Envoi d'une requête POST vers la route /stats/test_student
      const response = await fetch('http://localhost:5002/stats/test_student', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        // Données de test : deux groupes de valeurs numériques à comparer
        body: JSON.stringify({
          groupe1: [12.5, 15.3, 8.7, 21.0],
          groupe2: [9.8, 17.6, 11.4, 13.2]
        })
      });
      // Récupération et affichage de la réponse JSON
      const data = await response.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
