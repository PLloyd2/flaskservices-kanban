<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test /stats/correlation</title>
</head>
<body>
  <h2>Test unitaire — POST /stats/correlation</h2>
  <!-- Bouton qui déclenche le test au clic -->
  <button onclick="runTest()">Lancer le test</button>
  <!-- Zone d'affichage du résultat JSON -->
  <pre id="result"></pre>
  <script>
    async function runTest() {
      // Envoi d'une requête POST vers la route /stats/correlation
      const response = await fetch('http://localhost:5002/stats/correlation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        // Données de test : deux séries x et y de 5 valeurs chacune
        body: JSON.stringify({ x: [1, 2, 3, 4, 5], y: [2, 4, 5, 4, 5] })
      });
      // Récupération et affichage de la réponse JSON
      const data = await response.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
