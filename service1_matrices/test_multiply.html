
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Client - Service 1 Multiplication</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        pre { background: #f4f4f4; padding: 10px; border: 1px solid #ddd; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Test Unitaire Client - Multiplication de Matrices</h2>
    <p>Appuyez sur le bouton pour envoyer une requête POST de test vers l'API Flask.</p>
    
    <button id="btn-test">Lancer le Test de Multiplication</button>

    <h3>Résultat de la requête :</h3>
    <pre id="output">En attente du clic...</pre>

    <script>
        document.getElementById('btn-test').addEventListener('click', async () => {
            const output = document.getElementById('output');
            output.textContent = "Envoi de la requête...";

            const payload = {
                "A": [[1, 2, 3], [4, 5, 6]],
                "B": [[7, 8], [9, 10], [11, 12]]
            };

            try {
                const response = await fetch('http://localhost:5001/matrices/multiply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent = "Erreur de connexion au serveur Flask : " + error.message;
            }
        });
    </script>
</body>
</html>
