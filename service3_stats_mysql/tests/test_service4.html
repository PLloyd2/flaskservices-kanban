<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Tests unitaires — Service 4 : CSV → MySQL</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 2rem; max-width: 860px; margin: auto; }
    h1 { color: #7dd3fc; border-bottom: 1px solid #334; padding-bottom: .5rem; }
    h2 { color: #94a3b8; margin-top: 2rem; font-size: 1rem; text-transform: uppercase; letter-spacing: .05em; }
    .test { display: flex; gap: 1rem; align-items: flex-start; padding: .4rem .6rem; border-radius: 4px; margin: .25rem 0; }
    .test:hover { background: #1e293b; }
    .badge { min-width: 56px; text-align: center; padding: .15rem .5rem; border-radius: 3px; font-size: .8rem; font-weight: bold; }
    .pass  { background: #166534; color: #86efac; }
    .fail  { background: #7f1d1d; color: #fca5a5; }
    .skip  { background: #3b2f00; color: #fde68a; }
    .running { background: #1e3a5f; color: #93c5fd; }
    .label { flex: 1; }
    .detail { font-size: .75rem; color: #94a3b8; margin-top: .2rem; }
    #summary { margin-top: 2rem; padding: 1rem; border-radius: 6px; background: #1e293b; }
    #run-btn {
      background: #2563eb; color: white; border: none; padding: .6rem 1.4rem;
      border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 1rem;
    }
    #run-btn:hover { background: #1d4ed8; }
    #run-btn:disabled { background: #334155; cursor: not-allowed; }
    .url-row { display:flex; gap:.5rem; margin-bottom:1rem; align-items:center; }
    .url-row input { flex:1; background:#1e293b; border:1px solid #334; color:#eee; padding:.4rem .7rem; border-radius:4px; font-size:.9rem; }
    label { color:#94a3b8; font-size:.9rem; }
  </style>
</head>
<body>

<h1>🧪 Tests unitaires — Service 4</h1>
<p style="color:#94a3b8">Client HTTP vers <strong>POST /upload/csv</strong> et <strong>GET /upload/series</strong></p>

<div class="url-row">
  <label for="base">URL du service :</label>
  <input id="base" value="http://localhost:5004" />
</div>
<button id="run-btn" onclick="lancerTousLesTests()">▶ Lancer les tests</button>

<div id="resultats"></div>
<div id="summary" style="display:none"></div>

<script>
// ─── Helpers ─────────────────────────────────────────────────────────────────

function base() {
  return document.getElementById("base").value.replace(/\/$/, "");
}

/** Crée un Blob CSV à partir d'une chaîne de texte. */
function csvBlob(contenu, nom = "test.csv") {
  return new File([contenu], nom, { type: "text/csv" });
}

/** Envoie POST /upload/csv avec un fichier CSV. */
async function postCsv(contenu, nom = "test.csv", cle = "file") {
  const fd = new FormData();
  fd.append(cle, csvBlob(contenu, nom));
  const rep = await fetch(`${base()}/upload/csv`, { method: "POST", body: fd });
  const corps = await rep.json().catch(() => ({}));
  return { status: rep.status, corps };
}

/** Envoie GET /upload/series. */
async function getSeries() {
  const rep = await fetch(`${base()}/upload/series`);
  const corps = await rep.json().catch(() => ({}));
  return { status: rep.status, corps };
}

// ─── Moteur de tests ─────────────────────────────────────────────────────────

const CSV_VALIDE = `nom_serie,valeur,categorie,date_mesure
serie_TEST,1.0,cat,2024-01-01
serie_TEST,2.0,cat,2024-01-02
serie_TEST,3.0,cat,2024-01-03
`;

const CSV_MINIMAL = `nom_serie,valeur
serie_TEST,10.0
serie_TEST,20.0
`;

const CSV_VALEURS_MIXTES = `nom_serie,valeur,categorie,date_mesure
serie_TEST,12.5,cat,2024-01-01
serie_TEST,abc,cat,2024-01-02
serie_TEST,15.0,cat,2024-01-03
`;

const CSV_TOUT_INVALIDE = `nom_serie,valeur
serie_TEST,abc
serie_TEST,xyz
`;

const CSV_SANS_NOM_SERIE = `valeur,categorie
12.5,temperature
`;

const CSV_SANS_VALEUR = `nom_serie,categorie
serie_TEST,temperature
`;

let pass = 0, fail = 0;

function afficherTest(groupe, nom, statut, detail = "") {
  const zone = document.getElementById("g_" + groupe);
  const el = document.createElement("div");
  el.className = "test";
  el.innerHTML = `
    <span class="badge ${statut}">${statut === "running" ? "…" : statut.toUpperCase()}</span>
    <div class="label">${nom}${detail ? `<div class="detail">${detail}</div>` : ""}</div>`;
  el.id = "t_" + groupe + "_" + nom.replace(/\W/g, "_");
  zone.appendChild(el);
  return el;
}

function mettreAJour(el, statut, detail = "") {
  const badge = el.querySelector(".badge");
  badge.className = `badge ${statut}`;
  badge.textContent = statut.toUpperCase();
  if (detail) el.querySelector(".label").insertAdjacentHTML("beforeend", `<div class="detail">${detail}</div>`);
}

function creerGroupe(id, titre) {
  const div = document.createElement("div");
  div.innerHTML = `<h2>${titre}</h2>`;
  const zone = document.createElement("div");
  zone.id = "g_" + id;
  div.appendChild(zone);
  document.getElementById("resultats").appendChild(div);
}

async function runTest(groupe, nom, fn) {
  const el = afficherTest(groupe, nom, "running");
  try {
    const detail = await fn();
    pass++;
    mettreAJour(el, "pass", detail || "");
  } catch (e) {
    fail++;
    mettreAJour(el, "fail", e.message);
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg);
}

// ─── Suites de tests ─────────────────────────────────────────────────────────

async function testsValidation() {
  creerGroupe("val", "POST /upload/csv — Validation");

  await runTest("val", "Clé 'file' absente → 400", async () => {
    const fd = new FormData(); // aucun fichier
    const rep = await fetch(`${base()}/upload/csv`, { method: "POST", body: fd });
    assert(rep.status === 400, `Attendu 400, reçu ${rep.status}`);
    const c = await rep.json();
    assert("erreur" in c, "Champ 'erreur' absent");
    return `status=${rep.status}`;
  });

  await runTest("val", "Nom de fichier vide → 400", async () => {
    const fd = new FormData();
    fd.append("file", new File([CSV_VALIDE], "", { type: "text/csv" }));
    const rep = await fetch(`${base()}/upload/csv`, { method: "POST", body: fd });
    assert(rep.status === 400, `Attendu 400, reçu ${rep.status}`);
    return `status=${rep.status}`;
  });

  await runTest("val", "Extension .txt → 400", async () => {
    const { status, corps } = await postCsv(CSV_VALIDE, "donnees.txt");
    assert(status === 400, `Attendu 400, reçu ${status}`);
    assert(corps.erreur && corps.erreur.includes(".csv"), "Message d'erreur inattendu");
    return `status=${status}`;
  });

  await runTest("val", "Extension .xlsx → 400", async () => {
    const { status } = await postCsv(CSV_VALIDE, "donnees.xlsx");
    assert(status === 400, `Attendu 400, reçu ${status}`);
    return `status=${status}`;
  });

  await runTest("val", "Colonne 'nom_serie' manquante → 400", async () => {
    const { status, corps } = await postCsv(CSV_SANS_NOM_SERIE);
    assert(status === 400, `Attendu 400, reçu ${status}`);
    assert(Array.isArray(corps.manquantes) && corps.manquantes.includes("nom_serie"),
      `'nom_serie' absent de manquantes : ${JSON.stringify(corps)}`);
    return `status=${status}, manquantes=${JSON.stringify(corps.manquantes)}`;
  });

  await runTest("val", "Colonne 'valeur' manquante → 400", async () => {
    const { status, corps } = await postCsv(CSV_SANS_VALEUR);
    assert(status === 400, `Attendu 400, reçu ${status}`);
    assert(Array.isArray(corps.manquantes) && corps.manquantes.includes("valeur"),
      `'valeur' absent de manquantes : ${JSON.stringify(corps)}`);
    return `status=${status}, manquantes=${JSON.stringify(corps.manquantes)}`;
  });

  await runTest("val", "Toutes les valeurs non numériques → 400", async () => {
    const { status, corps } = await postCsv(CSV_TOUT_INVALIDE);
    assert(status === 400, `Attendu 400, reçu ${status}`);
    assert("erreur" in corps, "Champ 'erreur' absent");
    return `status=${status}`;
  });

  await runTest("val", "Mauvaise clé formulaire ('csv' au lieu de 'file') → 400", async () => {
    const { status } = await postCsv(CSV_VALIDE, "test.csv", "csv");
    assert(status === 400, `Attendu 400, reçu ${status}`);
    return `status=${status}`;
  });
}

async function testsSucces() {
  creerGroupe("ok", "POST /upload/csv — Succès");

  await runTest("ok", "CSV complet (4 colonnes) → 201 + 3 lignes insérées", async () => {
    const { status, corps } = await postCsv(CSV_VALIDE);
    assert(status === 201, `Attendu 201, reçu ${status}`);
    assert(corps.statut === "success", `statut=${corps.statut}`);
    assert(corps.lignes_inserees === 3, `lignes_inserees=${corps.lignes_inserees}`);
    assert(corps.lignes_invalides_ignorees === 0, `lignes_invalides=${corps.lignes_invalides_ignorees}`);
    assert(typeof corps.message === "string", "message manquant");
    return `lignes_inserees=${corps.lignes_inserees}, invalides=${corps.lignes_invalides_ignorees}`;
  });

  await runTest("ok", "CSV minimal (2 colonnes) → 201 + 2 lignes insérées", async () => {
    const { status, corps } = await postCsv(CSV_MINIMAL);
    assert(status === 201, `Attendu 201, reçu ${status}`);
    assert(corps.lignes_inserees === 2, `lignes_inserees=${corps.lignes_inserees}`);
    return `lignes_inserees=${corps.lignes_inserees}`;
  });

  await runTest("ok", "Lignes invalides ignorées et comptées", async () => {
    const { status, corps } = await postCsv(CSV_VALEURS_MIXTES);
    assert(status === 201, `Attendu 201, reçu ${status}`);
    assert(corps.lignes_inserees === 2, `lignes_inserees=${corps.lignes_inserees}`);
    assert(corps.lignes_invalides_ignorees === 1, `invalides=${corps.lignes_invalides_ignorees}`);
    return `insérées=${corps.lignes_inserees}, ignorées=${corps.lignes_invalides_ignorees}`;
  });

  await runTest("ok", "Réponse contient le bon nombre dans 'message'", async () => {
    const { status, corps } = await postCsv(CSV_VALIDE);
    assert(status === 201, `Attendu 201, reçu ${status}`);
    assert(corps.message.includes("3"), `message ne contient pas '3' : ${corps.message}`);
    return `message="${corps.message}"`;
  });

  await runTest("ok", "Colonne inconnue ignorée sans erreur → 201", async () => {
    const csv = "nom_serie,valeur,categorie,date_mesure,extra\nserie_TEST,5.0,cat,2024-01-01,ignoree\n";
    const { status, corps } = await postCsv(csv);
    assert(status === 201, `Attendu 201, reçu ${status}`);
    return `status=${status}`;
  });
}

async function testsSeries() {
  creerGroupe("series", "GET /upload/series");

  await runTest("series", "Retourne 200 avec clés 'series' et 'total'", async () => {
    const { status, corps } = await getSeries();
    assert(status === 200, `Attendu 200, reçu ${status}`);
    assert(Array.isArray(corps.series), "'series' doit être un tableau");
    assert(typeof corps.total === "number", "'total' doit être un nombre");
    return `status=${status}, total=${corps.total}`;
  });

  await runTest("series", "'total' cohérent avec la longueur de 'series'", async () => {
    const { corps } = await getSeries();
    assert(corps.total === corps.series.length,
      `total=${corps.total} ≠ series.length=${corps.series.length}`);
    return `total=${corps.total} === series.length`;
  });

  await runTest("series", "Chaque série a les champs requis", async () => {
    const { corps } = await getSeries();
    if (corps.series.length === 0) return "⚠ Aucune série en BDD (SKIP structurel)";
    const s = corps.series[0];
    ["serie", "n_points", "debut", "fin"].forEach(k => {
      assert(k in s, `Champ '${k}' manquant dans ${JSON.stringify(s)}`);
    });
    return `exemple : ${JSON.stringify(corps.series[0])}`;
  });

  await runTest("series", "serie_TEST présente après les uploads précédents", async () => {
    const { corps } = await getSeries();
    const noms = corps.series.map(s => s.serie);
    assert(noms.includes("serie_TEST"),
      `serie_TEST introuvable parmi : ${JSON.stringify(noms)}`);
    const s = corps.series.find(x => x.serie === "serie_TEST");
    return `n_points=${s.n_points}, debut=${s.debut}, fin=${s.fin}`;
  });
}

// ─── Lancement global ────────────────────────────────────────────────────────

async function lancerTousLesTests() {
  pass = 0; fail = 0;
  document.getElementById("resultats").innerHTML = "";
  document.getElementById("summary").style.display = "none";
  document.getElementById("run-btn").disabled = true;

  await testsValidation();
  await testsSucces();
  await testsSeries();

  const total = pass + fail;
  const ok = fail === 0;
  const summary = document.getElementById("summary");
  summary.style.display = "block";
  summary.style.borderLeft = `4px solid ${ok ? "#22c55e" : "#ef4444"}`;
  summary.innerHTML = `
    <strong style="color:${ok ? "#86efac" : "#fca5a5"}">
      ${ok ? "✅ Tous les tests sont passés" : "❌ Des tests ont échoué"}
    </strong><br>
    <span style="color:#94a3b8">${pass} / ${total} tests réussis</span>
  `;
  document.getElementById("run-btn").disabled = false;
}
</script>
</body>
</html>
